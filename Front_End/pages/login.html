<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GigLanka | Login</title>
  <style>
    body {
      margin: 0;
      font-family: 'Inter', sans-serif;
      background: #0f172a;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      color: white;
    }
    .login-card {
      background: rgba(30, 41, 59, 0.7);
      padding: 40px;
      border-radius: 16px;
      box-shadow: 0 4px 30px rgba(0, 0, 0, 0.5);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      width: 350px;
      text-align: center;
    }
    h2 { margin-bottom: 25px; font-weight: 600; letter-spacing: 1px; }
    .input-group { margin-bottom: 20px; text-align: left; }
    label { display: block; font-size: 13px; color: #94a3b8; margin-bottom: 5px; }
    input {
      width: 100%;
      padding: 12px;
      border-radius: 8px;
      border: 1px solid #334155;
      background: #1e293b;
      color: white;
      box-sizing: border-box;
      outline: none;
    }
    input:focus { border-color: #38bdf8; }
    .btn {
      width: 100%;
      padding: 12px;
      background: #38bdf8;
      border: none;
      border-radius: 8px;
      color: #0f172a;
      font-weight: bold;
      cursor: pointer;
      transition: 0.3s;
    }
    .btn:hover { background: #0ea5e9; transform: translateY(-2px); }
    .switch { margin-top: 20px; font-size: 13px; color: #94a3b8; }
    .switch a { color: #38bdf8; text-decoration: none; }
  </style>
</head>
<body>
<div class="login-card">
  <h2>GigLanka Login</h2>
  <form>
    <div class="input-group">
      <label>Username (Email)</label>
      <input type="email" id="email" placeholder="kavindu@example.com" required>
    </div>
    <div class="input-group">
      <label>Password</label>
      <input type="password" id="password" placeholder="••••••••" required>
    </div>
    <button type="button" class="btn" onclick="loginUser()">Sign In</button>
  </form>
  <div class="switch">Don't have an account? <a href="register.html">Register</a></div>
</div>
<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script>
  function loginUser() {
    let email = $('#email').val();
    let password = $('#password').val();

    $.ajax({
      url: 'http://localhost:8080/api/v1/auth/signin',
      method: 'POST',
      contentType: 'application/json',
      data: JSON.stringify({
        userName: email,
        password: password
      }),
      success: function(response) {
        // Response එකේ code එක number එකක් ද string එකක් ද කියා පරීක්ෂා කරන්න (ඔයාගේ JSON එකේ 200 තිබුණේ number එකක් ලෙසයි)
        if (response.code == 200 && response.data && response.data.access_token) {
          localStorage.setItem('jwtToken', response.data.access_token);
          alert("Login Successful!");
          window.location.href = "dashboard.html";
        } else {
          alert("Login failed: " + (response.message || "Invalid Response"));
        }
      },
      error: function(xhr) {
        alert("Error " + xhr.status + ": Login Failed");
        console.log(xhr.responseText);
      }
    });
  }
</script>
</body>
</html>
