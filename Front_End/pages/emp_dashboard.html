<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GigLanka | Employee Dashboard</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

    <style>
        body { margin: 0; font-family: 'Inter', sans-serif; background: #0f172a; color: white; min-height: 100vh; }
        .sidebar { height: 100vh; background: rgba(30, 41, 59, 0.5); backdrop-filter: blur(10px); border-right: 1px solid rgba(255, 255, 255, 0.1); position: fixed; width: 260px; padding: 30px 20px; z-index: 1000; }
        .main-content { margin-left: 260px; padding: 40px; }
        .glass-card { background: rgba(30, 41, 59, 0.7); padding: 25px; border-radius: 16px; border: 1px solid rgba(255, 255, 255, 0.1); box-shadow: 0 4px 30px rgba(0, 0, 0, 0.3); margin-bottom: 25px; }

        #map { height: 400px; border-radius: 12px; margin-bottom: 20px; border: 1px solid #334155; filter: grayscale(0.5) invert(0.9) hue-rotate(180deg); }

        .task-card { background: #1e293b; border: 1px solid #334155; padding: 15px; border-radius: 12px; margin-bottom: 12px; transition: 0.3s; }
        .task-card:hover { border-color: #10b981; transform: translateY(-2px); }

        select { background: #1e293b !important; border: 1px solid #334155 !important; color: white !important; border-radius: 8px !important; margin-bottom: 20px; }

        .btn-apply { background: #10b981; border: none; border-radius: 8px; padding: 8px 16px; font-weight: 600; color: white; }
        .btn-direction { background: #3b82f6; border: none; border-radius: 8px; padding: 8px 16px; font-weight: 600; color: white; margin-right: 5px; text-decoration: none; display: inline-block; font-size: 14px; }

        .nav-link { color: #94a3b8 !important; padding: 12px 15px; border-radius: 10px; margin-bottom: 10px; text-decoration: none; display: block; }
        .nav-link.active { background: rgba(16, 185, 129, 0.1); color: #10b981 !important; }
    </style>
</head>
<body>

<div class="sidebar">
    <h3 class="fw-bold mb-5" style="color: #10b981;">GigLanka</h3>
    <nav class="nav flex-column">
        <a class="nav-link active"><i class="fas fa-search me-2"></i> Browse Tasks</a>
        <a class="nav-link"><i class="fas fa-briefcase me-2"></i> My Applications</a>
        <div class="mt-5"><a class="nav-link text-danger" href="#"><i class="fas fa-sign-out-alt me-2"></i> Logout</a></div>
    </nav>
</div>

<div class="main-content">
    <div class="row">
        <div class="col-lg-8">
            <div class="glass-card">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h5><i class="fas fa-map-marked-alt text-success me-2"></i> Explore Tasks</h5>
                    <select id="districtFilter" class="form-select w-50" onchange="filterTasks()">
                        <option value="All">All Districts</option>
                        <option value="Colombo">Colombo</option>
                        <option value="Panadura">Panadura</option>
                        <option value="Galle">Galle</option>
                        <option value="Kandy">Kandy</option>
                    </select>
                </div>

                <div id="map"></div>

                <div id="taskList">
                </div>
            </div>
        </div>

        <div class="col-lg-4">
            <table class="table table-hover">
                <thead class="table-dark">
                <tr>
                    <th>Task Title</th>
                    <th>Applied Date</th>
                    <th>Status</th>
                    <th>Actions</th>
                </tr>
                </thead>
                <tbody id="employeeTaskTableBody">
                <tr>
                    <td colspan="4" class="text-center">Loading tasks...</td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
    let allTasks = []; // Backend එකෙන් එන ඔක්කොම tasks මෙතන තියාගන්නවා
    const map = L.map('map').setView([6.9271, 79.8612], 10);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
    let markersLayer = L.layerGroup().addTo(map);

    $(document).ready(function() {
        getAllTasksByUserId();
        fetchAllTasks();
    });

    function fetchAllTasks() {
        $.get('http://localhost:8080/api/v1/task/all', function(data) {
            allTasks = data;
            filterTasks(); // මුලින්ම ඔක්කොම පෙන්වනවා
        });
    }

    function filterTasks() {
        const selectedDist = $("#districtFilter").val();
        markersLayer.clearLayers(); // Map එකේ කලින් තිබ්බ markers අයින් කරනවා
        $("#taskList").empty();

        const filtered = allTasks.filter(t => selectedDist === "All" || t.locationName === selectedDist);

        filtered.forEach(task => {
            // 1. Map එකට Marker එකක් දානවා
            const marker = L.marker([task.latitude, task.longitude]).addTo(markersLayer);

            const googleMapsUrl = `https://www.google.com/maps/dir/?api=1&destination=${task.latitude},${task.longitude}`;

            marker.bindPopup(`
        <div style="color:black">
          <strong>${task.title}</strong><br>
          Budget: LKR ${task.budget}<br>
          <a href="${googleMapsUrl}" target="_blank" class="btn-direction mt-2" style="color:white; padding:5px; text-decoration:none; border-radius:5px; background:#3b82f6; display:block; text-align:center;">Get Directions</a>
        </div>
      `);

            // 2. පහළ List එකට Card එකක් දානවා
            $("#taskList").append(`
        <div class="task-card">
          <div class="d-flex justify-content-between align-items-center">
            <div>
              <h6 class="mb-1">${task.title}</h6>
              <p class="small text-muted mb-0">
                <i class="fas fa-coins me-1"></i> LKR ${task.budget} |
                <i class="fas fa-map-marker-alt me-1"></i> ${task.locationName}
              </p>
            </div>
            <div>
              <a href="${googleMapsUrl}" target="_blank" class="btn-direction"><i class="fas fa-location-arrow"></i></a>
              <button class="btn-apply" onclick="applyTask(${task.id})">Apply</button>
            </div>
          </div>
        </div>
      `);
        });

        if(filtered.length > 0 && selectedDist !== "All") {
            map.panTo([filtered[0].latitude, filtered[0].longitude]);
        }
    }

    function applyTask(taskId) {
        // Local Storage එකෙන් ලොග් වෙලා ඉන්න User ගේ ID එක ගන්න
        let loggedInUserId = localStorage.getItem("owner_id");
        let token = localStorage.getItem("jwtToken");

        if (!loggedInUserId) {
            alert("Please login first!");
            window.location.href = "login.html";
            return;
        }

        // TaskApplicationDto එකට ගැලපෙන data ටික විතරක් මෙතනට දාන්න
        let applicationData = {
            id: 0,
            task_id: taskId,               // Function එකට argument එකක් විදියට එන ID එක
            employee_id: parseInt(loggedInUserId),
            status: "PENDING",
            title:allTasks.title,
        };

        console.log("Applying for Task ID:", taskId);

        $.ajax({
            url: 'http://localhost:8080/api/v1/application',
            method: 'POST',
            contentType: 'application/json',
            headers: {
                'Authorization': 'Bearer ' + token
            },
            data: JSON.stringify(applicationData),
            success: function (response) {
                alert("Success: Applied for the task successfully!");
            },
            error: function (xhr) {
                alert("Error: " + xhr.status);
            }
        });
    }
    function getAllTasksByUserId() {
        let employeeId = localStorage.getItem("owner_id"); // මෙහි ඔබ store කර ඇත්තේ ලොග් වූ අයගේ ID එකයි
        let token = localStorage.getItem("jwtToken"); // JWT Token එක අවශ්‍ය නම් මෙතනින් ගන්න

        if (!employeeId) {
            console.error("Employee ID not found!");
            return;
        }

        // මෙහි URL එක ඔබේ Backend එකට අනුව වෙනස් විය හැකියි
        // (උදා: /api/v1/application/employee/5)
        $.ajax({
            url: `http://localhost:8080/api/v1/application/${employeeId}`,
            method: 'GET',
            headers: {
                'Authorization': 'Bearer ' + token // Token එක අවශ්‍ය නම් Header එකට එක් කරන්න
            },
            success: function(res) {
                let rows = "";

                // ඔබේ ApiResponse එකේ දත්ත එන්නේ res.data ලෙස නම්
                if (res.data && res.data.length > 0) {
                    res.data.forEach(app => {
                        // Application එකේ තියෙන Task details සහ Status එක මෙතනදී ගන්නවා
                        rows += `<tr>
                        <td>${app.title}</td>
                        <td>${app.appliedAt}</td>
                        <td>
                            <span class="badge ${getStatusColor(app.status)}">${app.status}</span>
                        </td>
                        <td>
                            <button class="btn btn-sm btn-danger" onclick="cancelApplication(${app.id})">
                                <i class="fas fa-times"></i> Cancel
                            </button>
                        </td>
                    </tr>`;
                    });
                } else {
                    rows = "<tr><td colspan='4' class='text-center'>You haven't applied for any tasks yet.</td></tr>";
                }

                $("#employeeTaskTableBody").html(rows); // HTML එකේ Table Body එකේ ID එක නිවැරදි කරන්න
            },
            error: function(xhr) {
                console.error("Error loading applied tasks:", xhr.responseText);
                if(xhr.status === 403) {
                    alert("Session expired. Please login again.");
                }
            }
        });
    }

    // Status එක අනුව Badge එකේ පාට වෙනස් කරන පොඩි function එකක්
    function getStatusColor(status) {
        switch (status) {
            case 'PENDING': return 'bg-warning text-dark';
            case 'ACCEPTED': return 'bg-success';
            case 'REJECTED': return 'bg-danger';
            default: return 'bg-secondary';
        }
    }

</script>
</body>
</html>
