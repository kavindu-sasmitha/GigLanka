<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GigLanka | Owner Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    :root {
      --primary: #10b981;
    }

    body {
      margin: 0;
      font-family: 'Inter', sans-serif;
      background: #f8fafc;
      color: #1e2937;
      min-height: 100vh;
    }

    /* Sidebar - Clean White */
    .sidebar {
      height: 100vh;
      background: white;
      border-right: 1px solid #e2e8f0;
      position: fixed;
      width: 280px;
      padding: 32px 24px;
      box-shadow: 2px 0 15px rgba(0, 0, 0, 0.05);
      z-index: 1000;
    }

    .logo-container {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 40px;
    }

    .logo {
      font-size: 28px;
      font-weight: 700;
      color: #0f172a;
      letter-spacing: -1px;
    }

    .sri-lanka-flag {
      width: 38px;
      height: 25px;
      background: linear-gradient(to right, #ff0000 40%, #ffcc00 40%);
      border: 1px solid #e2e8f0;
      position: relative;
      border-radius: 3px;
      overflow: hidden;
    }

    .sri-lanka-flag::before {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) rotate(15deg);
      width: 12px;
      height: 12px;
      background: #006600;
      border-radius: 50%;
    }

    .nav-link {
      color: #475569;
      padding: 14px 20px;
      border-radius: 12px;
      margin-bottom: 6px;
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 12px;
      font-weight: 500;
      font-size: 15.5px;
    }

    .nav-link:hover {
      background: #f1f5f9;
      color: var(--primary);
    }

    .nav-link.active {
      background: #ecfdf5;
      color: var(--primary);
      font-weight: 600;
      box-shadow: 0 0 0 2px rgba(16, 185, 129, 0.2);
    }

    /* Main Content */
    .main-content {
      margin-left: 280px;
      padding: 40px 50px;
    }

    .glass-card {
      background: white;
      border: 1px solid #e2e8f0;
      border-radius: 20px;
      padding: 32px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.06);
      margin-bottom: 30px;
    }

    h5, h6 {
      font-weight: 600;
      color: #0f172a;
    }

    /* Map */
    #map {
      height: 320px;
      border-radius: 16px;
      border: 1px solid #e2e8f0;
      margin-bottom: 20px;
    }

    /* Form Inputs */
    input, select {
      background: white !important;
      border: 1px solid #e2e8f0 !important;
      color: #1e2937 !important;
      border-radius: 12px !important;
      padding: 12px 16px;
    }

    input:focus, select:focus {
      border-color: var(--primary) !important;
      box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.15);
    }

    .btn-publish {
      background: linear-gradient(135deg, #10b981, #34d399);
      border: none;
      border-radius: 12px;
      padding: 14px;
      font-weight: 600;
      color: white;
      font-size: 15px;
      box-shadow: 0 4px 15px rgba(16, 185, 129, 0.25);
    }

    .btn-publish:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(16, 185, 129, 0.35);
    }

    /* Tables */
    .table {
      color: #1e2937;
    }

    .table th {
      color: #64748b;
      font-weight: 500;
      border-bottom: 1px solid #e2e8f0;
    }

    .badge {
      padding: 6px 14px;
      border-radius: 9999px;
      font-weight: 500;
      font-size: 13px;
    }

    /* Card Hover Effects */
    .glass-card:hover {
      box-shadow: 0 15px 35px rgba(0, 0, 0, 0.08);
    }
  </style>
</head>
<body>

<div class="sidebar">
  <div class="logo-container">
    <div class="sri-lanka-flag"></div>
    <div>
      <span class="logo">GigLanka</span>
    </div>
  </div>

  <p id="welcomeName" class="small mb-5 text-muted fw-medium"></p>

  <nav class="nav flex-column">
    <a class="nav-link active"><i class="fas fa-th-large me-2"></i> Dashboard</a>
    <div class="mt-auto pt-5">
      <a class="nav-link text-danger" onclick="logout()" style="cursor: pointer;">
        <i class="fas fa-sign-out-alt me-2"></i> Logout
      </a>
    </div>
  </nav>
</div>

<div class="main-content">
  <div class="row">
    <div class="col-lg-7">
      <!-- Post New Task -->
      <div class="glass-card">
        <h5 class="mb-4"><i class="fas fa-rocket text-success me-3"></i> Post a New Task</h5>
        <div id="map"></div>

        <form id="taskForm">
          <div class="row g-3">
            <div class="col-12">
              <input type="text" id="taskTitle" class="form-control" placeholder="Task Title (e.g. Need help with gardening)">
            </div>
            <div class="col-12">
              <input type="tel" id="contactNo" class="form-control" placeholder="Contact Phone Number (0771234567)">
            </div>

            <div class="col-md-6">
              <label class="form-label text-muted small">District</label>
              <select id="district" class="form-select">
                <option value="" selected disabled>Choose District...</option>
                <option value="Ampara">Ampara</option>
                <option value="Anuradhapura">Anuradhapura</option>
                <option value="Badulla">Badulla</option>
                <option value="Batticaloa">Batticaloa</option>
                <option value="Colombo">Colombo</option>
                <option value="Galle">Galle</option>
                <option value="Gampaha">Gampaha</option>
                <option value="Hambantota">Hambantota</option>
                <option value="Jaffna">Jaffna</option>
                <option value="Kalutara">Kalutara</option>
                <option value="Kandy">Kandy</option>
                <option value="Kegalle">Kegalle</option>
                <option value="Kilinochchi">Kilinochchi</option>
                <option value="Kurunegala">Kurunegala</option>
                <option value="Mannar">Mannar</option>
                <option value="Matale">Matale</option>
                <option value="Matara">Matara</option>
                <option value="Moneragala">Moneragala</option>
                <option value="Mullaitivu">Mullaitivu</option>
                <option value="Nuwara Eliya">Nuwara Eliya</option>
                <option value="Polonnaruwa">Polonnaruwa</option>
                <option value="Puttalam">Puttalam</option>
                <option value="Ratnapura">Ratnapura</option>
                <option value="Trincomalee">Trincomalee</option>
                <option value="Vavuniya">Vavuniya</option>
              </select>
            </div>

            <div class="col-md-6">
              <label class="form-label text-muted small">Budget (LKR)</label>
              <input type="number" id="budget" class="form-control" placeholder="e.g. 4500">
            </div>

            <div class="col-12">
              <button type="button" class="btn btn-publish w-100" onclick="saveTask()">
                <i class="fas fa-paper-plane me-2"></i> Publish Task
              </button>
            </div>
          </div>
        </form>
      </div>

      <!-- My Posted Tasks -->
      <div class="glass-card">
        <h6 class="mb-3">My Posted Tasks</h6>
        <div class="table-responsive">
          <table class="table table-hover align-middle">
            <thead>
            <tr>
              <th>Title</th>
              <th>Budget</th>
              <th>Status</th>
              <th class="text-end">Actions</th>
            </tr>
            </thead>
            <tbody id="myTaskTableBody"></tbody>
          </table>
        </div>
      </div>
    </div>

    <div class="col-lg-5">
      <!-- Release Payments -->
      <div class="glass-card">
        <h5 class="mb-4 text-success">
          <i class="fas fa-check-double me-2"></i> Release Payments
        </h5>
        <div id="ongoingTaskArea">
          <p class="small text-muted text-center py-4">Tasks accepted via Flash Match will appear here for payment release.</p>
        </div>
      </div>

      <!-- Transaction History -->
      <div class="glass-card">
        <h5 class="mb-4 text-warning">
          <i class="fas fa-history me-2"></i> Transaction History
        </h5>
        <div class="table-responsive">
          <table class="table table-hover align-middle" style="font-size: 13px;">
            <thead>
            <tr>
              <th>Date</th>
              <th>Task</th>
              <th>Amount</th>
              <th>Status</th>
            </tr>
            </thead>
            <tbody id="transactionTableBody"></tbody>
          </table>
        </div>
      </div>

      <!-- Incoming Applications -->
      <div class="glass-card">
        <h6 class="mb-3">Incoming Applications</h6>
        <div class="table-responsive">
          <table class="table table-hover align-middle" style="font-size: 13.5px;">
            <thead>
            <tr>
              <th>Task Info</th>
              <th>Employee</th>
              <th class="text-end">Action</th>
            </tr>
            </thead>
            <tbody id="appTableBody"></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
  const map = L.map('map').setView([6.9271, 79.8612], 13);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
  let marker = L.marker([6.9271, 79.8612], { draggable: true }).addTo(map);

  const token = localStorage.getItem('jwtToken');
  const ownerId = localStorage.getItem('owner_id');

  $(document).ready(() => {
    if (!token) {
      window.location.href = "login.html";
      return;
    }
    getAllTasksByUserId();
    loadApplications();
    loadTransactionHistory();
    $("#welcomeName").text("Welcome, " + (localStorage.getItem("fullName") || "Owner"));
  });

  function saveTask() {
    const pos = marker.getLatLng();
    const data = {
      id: 0,
      title: $("#taskTitle").val(),
      district: $("#district").val(),
      budget: parseFloat($("#budget").val()),
      latitude: pos.lat,
      longitude: pos.lng,
      ownerId: parseInt(ownerId),
      phoneNumber: $("#contactNo").val(),
      status: "PENDING"
    };

    if (!data.title || !data.district || !data.budget) {
      alert("Please fill all required fields!");
      return;
    }

    $.ajax({
      url: 'http://localhost:8080/api/v1/task',
      method: 'POST',
      headers: { 'Authorization': 'Bearer ' + token },
      contentType: 'application/json',
      data: JSON.stringify(data),
      success: () => {
        alert("Task Published Successfully!");
        getAllTasksByUserId();
        $("#taskForm")[0].reset();
        marker.setLatLng([6.9271, 79.8612]);
      },
      error: () => alert("Failed to publish task.")
    });
  }

  function getAllTasksByUserId() {
    $.ajax({
      url: `http://localhost:8080/api/v1/task/${ownerId}`,
      method: 'GET',
      headers: { 'Authorization': 'Bearer ' + token },
      success: (res) => {
        let rows = "";
        let ongoingHtml = "";

        const tasks = res.data || res;
        tasks.forEach(task => {
          const statusClass = task.status === 'PENDING' ? 'bg-warning text-dark' :
                  task.status === 'ONGOING' ? 'bg-success' : 'bg-secondary';

          rows += `<tr>
                    <td>${task.title}</td>
                    <td>LKR ${task.budget}</td>
                    <td><span class="badge ${statusClass}">${task.status}</span></td>
                    <td class="text-end">
                      <button class="btn btn-sm btn-outline-danger" onclick="deleteTask(${task.id})">
                        <i class="fas fa-trash"></i>
                      </button>
                    </td>
                  </tr>`;

          if(task.status === "ONGOING") {
            ongoingHtml += `
              <div class="p-3 mb-3 border rounded bg-light">
                <div class="d-flex justify-content-between align-items-center">
                  <div>
                    <strong>${task.title}</strong><br>
                    <small class="text-muted">Budget: LKR ${task.budget}</small>
                  </div>
                  <button class="btn btn-sm btn-success" onclick="completeAndPay(${task.id})">
                    Release Payment
                  </button>
                </div>
              </div>`;
          }
        });

        $("#myTaskTableBody").html(rows || `<tr><td colspan="4" class="text-center text-muted py-4">No tasks posted yet.</td></tr>`);
        $("#ongoingTaskArea").html(ongoingHtml || `<p class="small text-muted text-center py-4">No ongoing tasks for payment release.</p>`);
      }
    });
  }

  function loadApplications() {
    $.ajax({
      url: `http://localhost:8080/api/v1/application/${ownerId}`,
      method: 'GET',
      headers: { "Authorization": "Bearer " + token },
      success: function(res) {
        let rows = "";
        const data = res.data || res;

        if (data && data.length > 0) {
          data.forEach(app => {
            if (app.status === 'PENDING') {
              rows += `<tr>
                        <td><small>${app.title}</small></td>
                        <td>Emp ID: ${app.employee_id}</td>
                        <td class="text-end">
                          <button class="btn btn-sm btn-success me-1" onclick="changeStatus(${app.id}, 'ACCEPTED', ${app.task_id}, ${app.employee_id})">Accept</button>
                          <button class="btn btn-sm btn-danger" onclick="changeStatus(${app.id}, 'REJECTED', ${app.task_id}, ${app.employee_id})">Reject</button>
                        </td>
                      </tr>`;
            }
          });
        }

        $("#appTableBody").html(rows || `<tr><td colspan="3" class="text-center text-muted py-4">No pending applications found.</td></tr>`);
      }
    });
  }

  function completeAndPay(taskId) {
    if(!confirm("Release payment to the worker? This action cannot be undone.")) return;

    $.ajax({
      url: `http://localhost:8080/api/v1/task/complete/${taskId}`,
      method: 'POST',
      headers: { 'Authorization': 'Bearer ' + token },
      success: () => {
        alert("Payment Released Successfully!");
        getAllTasksByUserId();
        loadTransactionHistory();
      }
    });
  }

  function loadTransactionHistory() {
    $.ajax({
      url: `http://localhost:8080/api/v1/transactions/${ownerId}`,
      method: 'GET',
      headers: { 'Authorization': 'Bearer ' + token },
      success: (data) => {
        let rows = "";
        data.forEach(tx => {
          rows += `
            <tr>
              <td>${new Date(tx.timestamp).toLocaleDateString()}</td>
              <td><small>${tx.taskId || 'Task'}</small></td>
              <td class="text-end">Rs. ${tx.totalBudget || 0}</td>
              <td><span class="badge bg-success">Completed</span></td>
            </tr>`;
        });
        $("#transactionTableBody").html(rows || `<tr><td colspan="4" class="text-center text-muted py-4">No transactions yet.</td></tr>`);
      }
    });
  }

  function deleteTask(id) {
    if(confirm("Delete this task?")) {
      $.ajax({
        url: `http://localhost:8080/api/v1/task/${id}`,
        method: 'DELETE',
        headers: { 'Authorization': 'Bearer ' + token },
        success: () => getAllTasksByUserId()
      });
    }
  }

  function changeStatus(appId, status, taskId, empId) {
    if(!confirm(`Are you sure you want to ${status.toLowerCase()} this application?`)) return;

    $.ajax({
      url: `http://localhost:8080/api/v1/application/${appId}?status=${status}`,
      method: 'PATCH',
      headers: { 'Authorization': 'Bearer ' + token },
      success: () => {
        if(status === 'ACCEPTED') {
          $.ajax({
            url: `http://localhost:8080/api/v1/task/accept/${taskId}/${empId}`,
            method: 'POST',
            headers: { 'Authorization': 'Bearer ' + token },
            success: () => {
              alert("Application Accepted! Task is now ONGOING.");
              loadApplications();
              getAllTasksByUserId();
            }
          });
        } else {
          alert("Application Rejected!");
          loadApplications();
        }
      }
    });
  }

  function logout() {
    localStorage.clear();
    window.location.href = "login.html";
  }
</script>
</body>
</html>
