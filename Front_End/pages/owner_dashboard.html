<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GigLanka | Owner Dashboard</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

  <style>
    body {
      margin: 0;
      font-family: 'Inter', sans-serif;
      background: #0f172a;
      color: white;
      min-height: 100vh;
    }

    /* Sidebar Styling */
    .sidebar {
      height: 100vh;
      background: rgba(30, 41, 59, 0.5);
      backdrop-filter: blur(10px);
      border-right: 1px solid rgba(255, 255, 255, 0.1);
      position: fixed;
      width: 260px;
      padding: 30px 20px;
    }

    .main-content {
      margin-left: 260px;
      padding: 40px;
    }

    /* Card Styling */
    .glass-card {
      background: rgba(30, 41, 59, 0.7);
      padding: 25px;
      border-radius: 16px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      box-shadow: 0 4px 30px rgba(0, 0, 0, 0.3);
      margin-bottom: 25px;
    }

    /* Map Styling */
    #map {
      height: 300px;
      border-radius: 12px;
      margin-bottom: 20px;
      border: 1px solid #334155;
      filter: grayscale(0.5) invert(0.9) hue-rotate(180deg); /* Dark Mode Map */
    }

    /* Form Elements */
    label { font-size: 13px; color: #94a3b8; margin-bottom: 8px; display: block; }

    input, select {
      background: #1e293b !important;
      border: 1px solid #334155 !important;
      color: white !important;
      border-radius: 8px !important;
      padding: 10px !important;
    }

    input:focus, select:focus {
      border-color: #10b981 !important;
      box-shadow: 0 0 0 2px rgba(16, 185, 129, 0.2) !important;
    }

    /* Buttons */
    .btn-publish {
      background: #10b981;
      border: none;
      border-radius: 8px;
      padding: 12px;
      font-weight: 600;
      transition: 0.3s;
    }
    .btn-publish:hover { background: #059669; color: white; }

    .nav-link {
      color: #94a3b8 !important;
      padding: 12px 15px;
      border-radius: 10px;
      margin-bottom: 10px;
      transition: 0.3s;
    }
    .nav-link:hover, .nav-link.active {
      background: rgba(16, 185, 129, 0.1);
      color: #10b981 !important;
    }

    /* Application List */
    .app-item {
      background: rgba(15, 23, 42, 0.5);
      border: 1px solid rgba(255, 255, 255, 0.05);
      border-radius: 12px;
      margin-bottom: 12px;
      padding: 15px;
      transition: 0.3s;
    }
    .app-item:hover { border-color: #10b981; }

    .btn-chat {
      background: #38bdf8;
      border: none;
      border-radius: 50%;
      width: 35px;
      height: 35px;
      color: white;
    }

    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
  </style>
</head>
<body>

<div class="sidebar">
  <h3 class="fw-bold mb-5" style="color: #10b981;">GigLanka</h3>
  <nav class="nav flex-column">
    <a class="nav-link active"><i class="fas fa-th-large me-2"></i> Dashboard</a>
    <a class="nav-link"><i class="fas fa-clipboard-list me-2"></i> My Tasks</a>
    <a class="nav-link"><i class="fas fa-user-circle me-2"></i> Profile</a>
    <div class="mt-5">
      <a class="nav-link text-danger" onclick="logout()"><i class="fas fa-sign-out-alt me-2"></i> Logout</a>
    </div>
  </nav>
</div>

<div class="main-content">
  <div class="row">
    <div class="col-lg-7">
      <div class="glass-card">
        <h5 class="mb-4"><i class="fas fa-rocket text-success me-2"></i> Post a New Task</h5>

        <div id="map"></div>
        <p class="small text-muted mb-4"><i class="fas fa-info-circle me-1"></i> Drag the green marker to the exact job location.</p>

        <div class="row g-3">
          <div class="col-12">
            <label>Task Title</label>
            <input type="text" id="taskTitle" class="form-control" placeholder="e.g. Need a Web Developer">
          </div>
          <div class="col-md-6">
            <label>Location (District)</label>
            <select id="district" class="form-select">
              <option value="Colombo">Colombo</option>
              <option value="Panadura">Panadura</option>
              <option value="Galle">Galle</option>
              <option value="Kandy">Kandy</option>
            </select>
          </div>
          <div class="col-md-6">
            <label>Budget (LKR)</label>
            <input type="number" id="budget" class="form-control" placeholder="5000">
          </div>
          <div class="col-12 mt-4">
            <button class="btn btn-publish w-100 text-white" onclick="saveTask()">
              Publish Task
            </button>
          </div>
        </div>
      </div>
    </div>

    <div class="col-lg-5">
      <div class="glass-card">
        <h5 class="mb-4"><i class="fas fa-user-tie text-info me-2"></i> Recent Applications</h5>
        <div id="applicationList">
        </div>
      </div>
    </div>
  </div>
</div>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
  let selectedLat = 6.7115, selectedLng = 79.9075;
  const map = L.map('map').setView([selectedLat, selectedLng], 13);

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

  let marker = L.marker([selectedLat, selectedLng], { draggable: true }).addTo(map);

  marker.on('dragend', function (e) {
    let pos = marker.getLatLng();
    selectedLat = pos.lat;
    selectedLng = pos.lng;
  });

  $(document).ready(function() {
    const token = localStorage.getItem('jwtToken');
    if (!token) { window.location.href = "login.html"; return; }
    loadApplications();
  });

  // Task එකක් Backend එකට Save කිරීම
  function saveTask() {
    const token = localStorage.getItem('jwtToken');
    let taskData = {
      title: $('#taskTitle').val(),
      locationName: $('#district').val(),
      budget: parseFloat($('#budget').val()),
      latitude: selectedLat,
      longitude: selectedLng,
      description: "Task from GigLanka Dashboard"
    };

    $.ajax({
      url: 'http://localhost:8080/api/v1/task/save',
      method: 'POST',
      headers: {
        'Authorization': 'Bearer ' + token.trim(),
        'Content-Type': 'application/json'
      },
      data: JSON.stringify(taskData),
      success: function(response) {
        // Backend එකේ ApiResponse එකේ code එක 200 ද බලන්න
        if (response.code === 200) {
          alert(response.message); // "Task saved successfully"
          location.reload();
        } else {
          alert("Error: " + response.message);
        }
      },
      error: function(xhr) {
        if (xhr.status === 403) {
          alert("Session Expired. Please login again.");
          window.location.href = "login.html";
        } else {
          alert("Something went wrong. Please check the backend.");
        }
      }
    });
  }

  // Applications Load කිරීම
  function loadApplications() {
    const token = localStorage.getItem('jwtToken');
    $.ajax({
      url: "http://localhost:8080/api/v1/task/my-applications",
      method: "GET",
      headers: { 'Authorization': 'Bearer ' + token.trim() },
      success: function(response) {
        let list = $('#applicationList');
        list.empty();

        // මෙතනදී data list එක එන්නේ response.data ඇතුළේ
        if (response.code === 200 && response.data && response.data.length > 0) {
          response.data.forEach(app => {
            list.append(`
              <div class="app-item d-flex justify-content-between align-items-center">
                <div>
                  <div class="fw-bold text-white">${app.employeeName}</div>
                  <div class="small text-info">${app.taskTitle}</div>
                </div>
                <button class="btn-chat" onclick="alert('Chat feature coming soon!')">
                  <i class="fas fa-comment-dots"></i>
                </button>
              </div>
            `);
          });
        } else {
          list.html('<div class="text-center text-muted py-5">No applicants yet.</div>');
        }
      },
      error: function(xhr) {
        console.error("Failed to load applications:", xhr.status);
      }
    });
  }
  function logout() {
    localStorage.clear();
    window.location.href = "login.html";
  }
</script>
</body>
</html>
