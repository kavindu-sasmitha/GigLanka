<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GigLanka | Owner Dashboard</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

  <style>
    body { margin: 0; font-family: 'Inter', sans-serif; background: #0f172a; color: white; min-height: 100vh; }
    .sidebar { height: 100vh; background: rgba(30, 41, 59, 0.5); backdrop-filter: blur(10px); border-right: 1px solid rgba(255, 255, 255, 0.1); position: fixed; width: 260px; padding: 30px 20px; }
    .main-content { margin-left: 260px; padding: 40px; }
    .glass-card { background: rgba(30, 41, 59, 0.7); padding: 25px; border-radius: 16px; border: 1px solid rgba(255, 255, 255, 0.1); box-shadow: 0 4px 30px rgba(0, 0, 0, 0.3); margin-bottom: 25px; }
    #map { height: 300px; border-radius: 12px; margin-bottom: 20px; border: 1px solid #334155; filter: grayscale(0.5) invert(0.9) hue-rotate(180deg); }
    label { font-size: 13px; color: #94a3b8; margin-bottom: 8px; display: block; }
    input, select { background: #1e293b !important; border: 1px solid #334155 !important; color: white !important; border-radius: 8px !important; padding: 10px !important; }
    .btn-publish { background: #10b981; border: none; border-radius: 8px; padding: 12px; font-weight: 600; transition: 0.3s; color: white; }
    .btn-publish:hover { background: #059669; }
    .nav-link { color: #94a3b8 !important; padding: 12px 15px; border-radius: 10px; margin-bottom: 10px; transition: 0.3s; cursor: pointer; text-decoration: none; display: block; }
    .nav-link:hover, .nav-link.active { background: rgba(16, 185, 129, 0.1); color: #10b981 !important; }
    .table { color: white !important; }
    .modal-content { background: #1e293b; color: white; border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 16px; }
    .profile-initial { width: 60px; height: 60px; background: #10b981; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 24px; font-weight: bold; margin-bottom: 15px; }
  </style>
</head>
<body>

<div class="sidebar">
  <h3 class="fw-bold mb-5" style="color: #10b981;">GigLanka</h3>
  <nav class="nav flex-column">
    <a class="nav-link active"><i class="fas fa-th-large me-2"></i> Dashboard</a>
    <a class="nav-link text-danger" onclick="logout()"><i class="fas fa-sign-out-alt me-2"></i> Logout</a>
  </nav>
</div>

<div class="main-content">
  <div class="row">
    <div class="col-lg-7">
      <div class="glass-card">
        <h5 class="mb-4"><i class="fas fa-rocket text-success me-2"></i> Post a New Task</h5>
        <div id="map"></div>
        <form id="taskForm">
          <div class="row g-3">
            <div class="col-12"><label>Task Title</label><input type="text" id="taskTitle" class="form-control" placeholder="Task Title"></div>
            <div class="col-md-6"><label>District</label><select id="district" class="form-select"><option value="Colombo">Colombo</option><option value="Galle">Galle</option></select></div>
            <div class="col-md-6"><label>Budget (LKR)</label><input type="number" id="budget" class="form-control"></div>
            <div class="col-md-12"><label>Phone</label><input type="text" id="phone" class="form-control"></div>
            <div class="col-12 mt-4"><button type="button" class="btn btn-publish w-100" onclick="saveTask()">Publish Task</button></div>
          </div>
        </form>
      </div>

      <div class="glass-card">
        <h5 class="mb-4"><i class="fas fa-list text-warning me-2"></i> My Posted Tasks</h5>
        <div class="table-responsive">
          <table class="table table-dark table-hover">
            <thead><tr><th>Title</th><th>Budget</th><th>Status</th><th>Actions</th></tr></thead>
            <tbody id="myTaskTableBody"></tbody>
          </table>
        </div>
      </div>
    </div>

    <div class="col-lg-5">
      <div class="glass-card">
        <h5 class="mb-4"><i class="fas fa-user-tie text-info me-2"></i> Recent Applications</h5>
        <div class="table-responsive">
          <table class="table table-dark table-hover" style="font-size: 13px;">
            <thead><tr><th>Task</th><th>Employee</th><th>Action</th></tr></thead>
            <tbody id="appTableBody"></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="modal fade" id="editTaskModal" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header border-0"><h5 class="modal-title">Edit Task</h5><button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button></div>
      <div class="modal-body">
        <input type="hidden" id="editTaskId">
        <div class="mb-3"><label>Title</label><input type="text" id="editTitle" class="form-control"></div>
        <div class="mb-3"><label>Budget</label><input type="number" id="editBudget" class="form-control"></div>
      </div>
      <div class="modal-footer border-0"><button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button><button type="button" class="btn btn-success" onclick="updateTask()">Save Changes</button></div>
    </div>
  </div>
</div>

<div class="modal fade" id="viewProfileModal" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content text-center p-4">
      <div class="modal-header border-0 justify-content-center">
        <div class="profile-initial" id="profInitial">?</div>
      </div>
      <div class="modal-body pt-0">
        <h4 id="profName" class="mb-1">---</h4>
        <p id="profRole" class="text-success small mb-3">Employee</p>
        <hr style="border-color: rgba(255,255,255,0.1)">
        <div class="text-start">
          <label>Full Name</label>
          <p id="profFullName" class="mb-3">---</p>
          <label>Email / Username</label>
          <p id="profEmail" class="mb-3">---</p>
          <label>NIC Number</label>
          <p id="profNIC" class="mb-0">---</p>
        </div>
      </div>
      <div class="modal-footer border-0">
        <button type="button" class="btn btn-outline-light w-100" data-bs-dismiss="modal">Close</button>
      </div>
    </div>
  </div>
</div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
  const map = L.map('map').setView([6.9271, 79.8612], 13);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
  let marker = L.marker([6.9271, 79.8612], { draggable: true }).addTo(map);

  $(document).ready(() => {
    getAllTasksByUserId();
    loadApplications();
  });

  // 2. Save Task
  function saveTask() {
    let title = $("#taskTitle").val();
    let locationName = $("#district").val();
    let budget = $("#budget").val();
    let phoneNumber = $("#phone").val();
    const position = marker.getLatLng();
    let idFromStorage = localStorage.getItem("owner_id");

    // සරල Validation එකක්
    if(!title || !budget) {
      alert("Please fill in the Task Title and Budget!");
      return;
    }

    // JSON Object එක DTO එකට ගැලපෙන විදිහට හදනවා
    let taskData = {
      id: 0, // Backend එකේ long id නිසා 0 යවමු
      title: title,
      locationName: locationName,
      budget: parseFloat(budget),
      latitude: position.lat,
      longitude: position.lng,
      phoneNumber: phoneNumber,
      ownerId:parseInt(idFromStorage),
      status: "PENDING" // DTO එකේ @NotBlank තියෙන නිසා මේක අනිවාර්යයි
    };

    console.log("Sending Data:", taskData);

    $.ajax({
      url: 'http://localhost:8080/api/v1/task',
      method: 'POST',
      contentType: 'application/json',
      data: JSON.stringify(taskData),
      success: function (response) {
        alert("Success: Task Published Successfully!");
        // Form එක clear කරනවා
        $("#taskTitle").val("");
        $("#budget").val("");
        // Marker එක මුල් තැනට (Colombo) ගන්නවා
        marker.setLatLng([6.9271, 79.8612]);
        map.setView([6.9271, 79.8612], 13);
      },
      error: function (xhr) {
        console.error("Error Detail:", xhr.responseText);
        alert("Error " + xhr.status + ": " + (xhr.responseJSON ? xhr.responseJSON.message : "Failed to save task"));
      }
    });
  }
  function getAllTasksByUserId() {
    let ownerId = localStorage.getItem("owner_id");

    if (!ownerId) {
      console.error("Owner ID not found!");
      return;
    }

    $.get(`http://localhost:8080/api/v1/task/${ownerId}`, function(res) {
      let rows = "";

      // මෙතන res.data ලෙස පරීක්ෂා කරන්න (ඔබේ ApiResponse එකේ field එක data නම්)
      if (res.data && res.data.length > 0) {
        res.data.forEach(task => {
          rows += `<tr>
                  <td>${task.title}</td>
                  <td>${task.budget}</td>
                  <td><span class="badge bg-primary">${task.status}</span></td>
                  <td>
                      <button class="btn btn-sm btn-info me-1" onclick="openEditModal(${task.id}, '${task.title}', ${task.budget})">
                          <i class="fas fa-edit"></i>
                      </button>
                      <button class="btn btn-sm btn-danger" onclick="deleteTask(${task.id})">
                          <i class="fas fa-trash"></i>
                      </button>
                  </td>
              </tr>`;
        });
      } else {
        rows = "<tr><td colspan='4' class='text-center'>No tasks found.</td></tr>";
      }

      $("#myTaskTableBody").html(rows);
    }).fail(function(xhr) {
      console.error("Error loading tasks:", xhr.responseText);
    });
  }

  function deleteTask(id) {
    if(confirm("Delete this task?")) {
      $.ajax({ url: `http://localhost:8080/api/v1/task/${id}`, method: 'DELETE', success: () => getAllTasksByUserId() });
    }
  }

  function openEditModal(id, title, budget) {
    $("#editTaskId").val(id); $("#editTitle").val(title); $("#editBudget").val(budget);
    new bootstrap.Modal($('#editTaskModal')).show();
  }

  function updateTask() {
    let id = $("#editTaskId").val();
    let data = { title: $("#editTitle").val(), budget: $("#editBudget").val() };
    $.ajax({ url: `http://localhost:8080/api/v1/task/${id}`, method: 'PUT', contentType: 'application/json', data: JSON.stringify(data), success: () => { alert("Updated!"); location.reload(); } });
  }

  // --- Application Functions ---
  function loadApplications() {
    $.get("http://localhost:8080/api/v1/application/all", (res) => {
      let rows = "";
      res.forEach(app => {
        rows += `<tr>
          <td>ID: ${app.task_id}</td>
          <td><button class="btn btn-sm btn-outline-info" onclick="viewEmployeeProfile(${app.employee_id})"><i class="fas fa-user me-1"></i> View Profile</button></td>
          <td>
            <button class="btn btn-sm btn-success me-1" onclick="updateAppStatus(${app.id}, 'ACCEPTED')"><i class="fas fa-check"></i></button>
            <button class="btn btn-sm btn-danger" onclick="updateAppStatus(${app.id}, 'REJECTED')"><i class="fas fa-times"></i></button>
          </td>
        </tr>`;
      });
      $("#appTableBody").html(rows);
    });
  }

  // --- View Employee Profile Function ---
  function viewEmployeeProfile(empId) {
    $.ajax({
      url: `http://localhost:8080/api/v1/user/${empId}`,
      method: 'GET',
      success: function(user) {
        $("#profInitial").text(user.fullName.charAt(0).toUpperCase());
        $("#profName").text(user.fullName);
        $("#profFullName").text(user.fullName);
        $("#profEmail").text(user.userName);
        $("#profNIC").text(user.nic || "Not Provided");

        new bootstrap.Modal($('#viewProfileModal')).show();
      },
      error: () => alert("Could not load employee profile.")
    });
  }

  function updateAppStatus(id, status) {
    $.ajax({ url: `http://localhost:8080/api/v1/application/${id}?status=${status}`, method: 'PATCH', success: () => loadApplications() });
  }

  function logout() { localStorage.clear(); window.location.href = "login.html"; }
</script>
</body>
</html>
