<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GigLanka | Owner Dashboard</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

  <style>
    body { margin: 0; font-family: 'Inter', sans-serif; background: #0f172a; color: white; min-height: 100vh; }
    .sidebar { height: 100vh; background: rgba(30, 41, 59, 0.5); backdrop-filter: blur(10px); border-right: 1px solid rgba(255, 255, 255, 0.1); position: fixed; width: 260px; padding: 30px 20px; }
    .main-content { margin-left: 260px; padding: 40px; }
    .glass-card { background: rgba(30, 41, 59, 0.7); padding: 25px; border-radius: 16px; border: 1px solid rgba(255, 255, 255, 0.1); box-shadow: 0 4px 30px rgba(0, 0, 0, 0.3); margin-bottom: 25px; }
    #map { height: 300px; border-radius: 12px; margin-bottom: 20px; border: 1px solid #334155; filter: grayscale(0.5) invert(0.9) hue-rotate(180deg); }
    label { font-size: 13px; color: #94a3b8; margin-bottom: 8px; display: block; }
    input, select { background: #1e293b !important; border: 1px solid #334155 !important; color: white !important; border-radius: 8px !important; padding: 10px !important; }
    input:focus, select:focus { border-color: #10b981 !important; box-shadow: 0 0 0 2px rgba(16, 185, 129, 0.2) !important; }
    .btn-publish { background: #10b981; border: none; border-radius: 8px; padding: 12px; font-weight: 600; transition: 0.3s; color: white; }
    .btn-publish:hover { background: #059669; }
    .nav-link { color: #94a3b8 !important; padding: 12px 15px; border-radius: 10px; margin-bottom: 10px; transition: 0.3s; cursor: pointer; text-decoration: none; display: block; }
    .nav-link:hover, .nav-link.active { background: rgba(16, 185, 129, 0.1); color: #10b981 !important; }
    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
  </style>
</head>
<body>

<div class="sidebar">
  <h3 class="fw-bold mb-5" style="color: #10b981;">GigLanka</h3>
  <nav class="nav flex-column">
    <a class="nav-link active"><i class="fas fa-th-large me-2"></i> Dashboard</a>
    <a class="nav-link"><i class="fas fa-clipboard-list me-2"></i> My Tasks</a>
    <a class="nav-link"><i class="fas fa-user-circle me-2"></i> Profile</a>
    <div class="mt-5">
      <a class="nav-link text-danger" onclick="logout()"><i class="fas fa-sign-out-alt me-2"></i> Logout</a>
    </div>
  </nav>
</div>

<div class="main-content">
  <div class="row">
    <div class="col-lg-7">
      <div class="glass-card">
        <h5 class="mb-4"><i class="fas fa-rocket text-success me-2"></i> Post a New Task</h5>
        <div id="map"></div>
        <p class="small text-muted mb-4"><i class="fas fa-info-circle me-1"></i> Drag the green marker to the exact job location.</p>

        <form id="taskForm">
          <div class="row g-3">
            <div class="col-12">
              <label>Task Title</label>
              <input type="text" id="taskTitle" class="form-control" placeholder="e.g. Need a Web Developer" required>
            </div>
            <div class="col-md-6">
              <label>Location (District)</label>
              <select id="district" class="form-select">
                <option value="Colombo">Colombo</option>
                <option value="Panadura">Panadura</option>
                <option value="Galle">Galle</option>
                <option value="Kandy">Kandy</option>
                <option value="Kalutara">Kalutara</option>
              </select>
            </div>
            <div class="col-md-6">
              <label>Budget (LKR)</label>
              <input type="number" id="budget" class="form-control" placeholder="5000" required>

            </div>
            <div class="col-md-6">
              <label>Phone Number</label>
              <input type="text" id="phone" class="form-control" placeholder="07x xxxxxxx" required>
            </div>
            <div class="col-12 mt-4">
              <button type="button" class="btn btn-publish w-100" onclick="saveTask()">
                Publish Task
              </button>
            </div>
          </div>
        </form>
      </div>
    </div>

    <div class="col-lg-5">
      <div class="glass-card">
        <h5 class="mb-4"><i class="fas fa-user-tie text-info me-2"></i> Recent Applications</h5>
        <div id="applicationList">
          <p class="text-muted text-center small">No applications yet.</p>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
  // 1. Initialize Map
  const map = L.map('map').setView([6.9271, 79.8612], 13);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

  let marker = L.marker([6.9271, 79.8612], { draggable: true }).addTo(map);

  // 2. Save Task
  function saveTask() {
    let title = $("#taskTitle").val();
    let locationName = $("#district").val();
    let budget = $("#budget").val();
    let phoneNumber = $("#phone").val();
    const position = marker.getLatLng();
    let idFromStorage = localStorage.getItem("owner_id");

    // සරල Validation එකක්
    if(!title || !budget) {
      alert("Please fill in the Task Title and Budget!");
      return;
    }

    // JSON Object එක DTO එකට ගැලපෙන විදිහට හදනවා
    let taskData = {
      id: 0, // Backend එකේ long id නිසා 0 යවමු
      title: title,
      locationName: locationName,
      budget: parseFloat(budget),
      latitude: position.lat,
      longitude: position.lng,
      phoneNumber: phoneNumber,
      owner_id:parseInt(idFromStorage),
      status: "PENDING" // DTO එකේ @NotBlank තියෙන නිසා මේක අනිවාර්යයි
    };

    console.log("Sending Data:", taskData);

    $.ajax({
      url: 'http://localhost:8080/api/v1/task',
      method: 'POST',
      contentType: 'application/json',
      data: JSON.stringify(taskData),
      success: function (response) {
        alert("Success: Task Published Successfully!");
        // Form එක clear කරනවා
        $("#taskTitle").val("");
        $("#budget").val("");
        // Marker එක මුල් තැනට (Colombo) ගන්නවා
        marker.setLatLng([6.9271, 79.8612]);
        map.setView([6.9271, 79.8612], 13);
      },
      error: function (xhr) {
        console.error("Error Detail:", xhr.responseText);
        alert("Error " + xhr.status + ": " + (xhr.responseJSON ? xhr.responseJSON.message : "Failed to save task"));
      }
    });
  }

  function logout() {
    window.location.href = "login.html";
  }
</script>
</body>
</html>
