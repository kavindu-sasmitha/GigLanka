<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GigLanka | Owner Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    body { margin: 0; font-family: 'Inter', sans-serif; background: #0f172a; color: white; min-height: 100vh; }
    .sidebar { height: 100vh; background: rgba(30, 41, 59, 0.5); backdrop-filter: blur(10px); border-right: 1px solid rgba(255, 255, 255, 0.1); position: fixed; width: 260px; padding: 30px 20px; }
    .main-content { margin-left: 260px; padding: 40px; }
    .glass-card { background: rgba(30, 41, 59, 0.7); padding: 25px; border-radius: 16px; border: 1px solid rgba(255, 255, 255, 0.1); box-shadow: 0 4px 30px rgba(0, 0, 0, 0.3); margin-bottom: 25px; }
    #map { height: 300px; border-radius: 12px; margin-bottom: 20px; border: 1px solid #334155; filter: grayscale(0.5) invert(0.9) hue-rotate(180deg); }
    input, select { background: #1e293b !important; border: 1px solid #334155 !important; color: white !important; border-radius: 8px !important; }
    .btn-publish { background: #10b981; border: none; border-radius: 8px; padding: 12px; font-weight: 600; color: white; }
    .table-dark { --bs-table-bg: transparent; border-color: rgba(255,255,255,0.1); }
  </style>
</head>
<body>

<div class="sidebar">
  <h3 class="fw-bold mb-2" style="color: #10b981;">GigLanka</h3>
  <p id="welcomeName" class="small mb-5 text-secondary"></p>
  <nav class="nav flex-column">
    <a class="nav-link active" style="color: #10b981;"><i class="fas fa-th-large me-2"></i> Dashboard</a>
    <a class="nav-link text-danger mt-5" onclick="logout()" style="cursor: pointer;"><i class="fas fa-sign-out-alt me-2"></i> Logout</a>
  </nav>
</div>

<div class="main-content">
  <div class="row">
    <div class="col-lg-7">
      <div class="glass-card">
        <h5><i class="fas fa-rocket text-success me-2"></i> Post a New Task</h5>
        <div id="map"></div>
        <form id="taskForm">
          <div class="row g-3">
            <div class="col-12"><input type="text" id="taskTitle" class="form-control" placeholder="Task Title"></div>
            <div class="col-12">
              <input type="tel" id="contactNo" class="form-control" placeholder="Contact Phone Number (e.g. 0771234567)">
            </div>

            <div class="col-md-6">
              <label for="district" class="form-label text-white-50 small">Select District</label>
              <select id="district" class="form-select bg-dark text-white border-secondary">
                <option value="" selected disabled>Choose District...</option>
                <option value="Ampara">Ampara</option>
                <option value="Anuradhapura">Anuradhapura</option>
                <option value="Badulla">Badulla</option>
                <option value="Batticaloa">Batticaloa</option>
                <option value="Colombo">Colombo</option>
                <option value="Galle">Galle</option>
                <option value="Gampaha">Gampaha</option>
                <option value="Hambantota">Hambantota</option>
                <option value="Jaffna">Jaffna</option>
                <option value="Kalutara">Kalutara</option>
                <option value="Kandy">Kandy</option>
                <option value="Kegalle">Kegalle</option>
                <option value="Kilinochchi">Kilinochchi</option>
                <option value="Kurunegala">Kurunegala</option>
                <option value="Mannar">Mannar</option>
                <option value="Matale">Matale</option>
                <option value="Matara">Matara</option>
                <option value="Moneragala">Moneragala</option>
                <option value="Mullaitivu">Mullaitivu</option>
                <option value="Nuwara Eliya">Nuwara Eliya</option>
                <option value="Polonnaruwa">Polonnaruwa</option>
                <option value="Puttalam">Puttalam</option>
                <option value="Ratnapura">Ratnapura</option>
                <option value="Trincomalee">Trincomalee</option>
                <option value="Vavuniya">Vavuniya</option>
              </select>
            </div>
            <div class="col-md-6"><input type="number" id="budget" class="form-control" placeholder="Budget LKR"></div>
            <div class="col-12"><button type="button" class="btn btn-publish w-100" onclick="saveTask()">Publish Task</button></div>
          </div>
        </form>
      </div>

      <div class="glass-card">
        <h6>My Posted Tasks</h6>
        <table class="table table-dark table-hover mt-3">
          <thead><tr><th>Title</th><th>Budget</th><th>Status</th><th>Actions</th></tr></thead>
          <tbody id="myTaskTableBody"></tbody>
        </table>
      </div>
    </div>

    <div class="col-lg-5">
      <div class="glass-card">
        <h5 class="text-info mb-4"><i class="fas fa-check-double me-2"></i> Release Payments</h5>
        <div id="ongoingTaskArea">
          <p class="small text-muted">Tasks accepted via Flash Match will appear here for payment release.</p>
        </div>
      </div>

      <div class="glass-card">
        <h5 class="text-warning mb-4"><i class="fas fa-history me-2"></i> Transaction History</h5>
        <div class="table-responsive">
          <table class="table table-dark table-hover" style="font-size: 12px;">
            <thead>
            <tr><th>Date</th><th>Task</th><th>Amount</th><th>Status</th></tr>
            </thead>
            <tbody id="transactionTableBody"></tbody>
          </table>
        </div>
      </div>

      <div class="glass-card">
        <h6>Incoming Applications</h6>
        <table class="table table-dark table-hover" style="font-size: 13px;">
          <thead><tr><th>Task Info</th><th>Emp ID</th><th>Action</th></tr></thead>
          <tbody id="appTableBody"></tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
  const map = L.map('map').setView([6.9271, 79.8612], 13);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
  let marker = L.marker([6.9271, 79.8612], { draggable: true }).addTo(map);

  const token = localStorage.getItem('jwtToken');
  const ownerId = localStorage.getItem('owner_id');

  $(document).ready(() => {
    if (!token) { window.location.href = "login.html"; return; }
    getAllTasksByUserId();
    loadApplications();
    loadTransactionHistory();
    $("#welcomeName").text("Welcome, " + (localStorage.getItem("fullName") || "Owner"));
  });

  function saveTask() {
    const pos = marker.getLatLng();
    const data = {
      id: 0,
      title: $("#taskTitle").val(),
      district: $("#district").val(),
      budget: parseFloat($("#budget").val()),
      latitude: pos.lat, longitude: pos.lng,
      ownerId: parseInt(ownerId),
      phoneNumber: $("#contactNo").val(),
      status: "PENDING"
    };
    $.ajax({
      url: 'http://localhost:8080/api/v1/task',
      method: 'POST',
      headers: { 'Authorization': 'Bearer ' + token },
      contentType: 'application/json',
      data: JSON.stringify(data),
      success: () => {
        alert("Published Successfully!");
        getAllTasksByUserId();
        $("#taskForm")[0].reset();
      }
    });
  }

  function getAllTasksByUserId() {
    $.ajax({
      url: `http://localhost:8080/api/v1/task/${ownerId}`,
      method: 'GET',
      headers: { 'Authorization': 'Bearer ' + token },
      success: (res) => {
        let rows = "";
        let ongoingHtml = "";
        res.data.forEach(task => {
          rows += `<tr><td>${task.title}</td><td>LKR ${task.budget}</td><td><span class="badge bg-secondary">${task.status}</span></td><td><button class="btn btn-sm btn-danger" onclick="deleteTask(${task.id})"><i class="fas fa-trash"></i></button></td></tr>`;

          if(task.status === "ONGOING") {
            ongoingHtml += `<div class="p-3 mb-2 border rounded" style="background: #1e293b; border-color: #3b82f6 !important;">
                          <div class="d-flex justify-content-between align-items-center">
                              <span>${task.title} <br><small class="text-muted">Budget: LKR ${task.budget}</small></span>
                              <button class="btn btn-sm btn-success" onclick="completeAndPay(${task.id})">Release 98%</button>
                          </div>
                      </div>`;
          }
        });
        $("#myTaskTableBody").html(rows);
        $("#ongoingTaskArea").html(ongoingHtml || "<p class='small text-muted text-center'>No ongoing tasks found.</p>");
      }
    });
  }

  function loadApplications() {
    if (!ownerId || !token) return;

    $.ajax({
      url: `http://localhost:8080/api/v1/application/${ownerId}`,
      method: 'GET',
      headers: { "Authorization": "Bearer " + token },
      success: function(res) {
        let rows = "";
        const data = res.data || res; // Backend එකෙන් එන විදිහ අනුව handle කරන්න

        if (data && data.length > 0) {
          data.forEach(app => {
            // මෙන්න මෙතනදී PENDING ඒව විතරක් පෙන්වන්න filter එකක් දාන්න
            if (app.status === 'PENDING') {
              rows += `<tr>
                        <td>${app.title}</td>
                        <td>Employee ID: ${app.employee_id}</td>
                        <td>
                             <button class="btn btn-sm btn-success me-1" onclick="changeStatus(${app.id}, 'ACCEPTED', ${app.task_id}, ${app.employee_id})">Accept</button>
                             <button class="btn btn-sm btn-danger" onclick="changeStatus(${app.id}, 'REJECTED', ${app.task_id}, ${app.employee_id})">Reject</button>
                        </td>
                    </tr>`;
            }
          });
        }

        // Rows මොකුත් හැදුනේ නැත්නම් (හිස් නම්) මේ message එක පෙන්වනවා
        $("#appTableBody").html(rows || "<tr><td colspan='3' class='text-center text-muted'>No pending applications found.</td></tr>");
      }
    });
  }

  function completeAndPay(taskId) {
    if(!confirm("Are you sure? This will release the payment to the student's wallet.")) return;
    $.ajax({
      url: `http://localhost:8080/api/v1/task/complete/${taskId}`,
      method: 'POST',
      headers: { 'Authorization': 'Bearer ' + token },
      success: () => {
        alert("Payment Released Successfully!");
        getAllTasksByUserId();
        loadTransactionHistory();
      }
    });
  }

  function loadTransactionHistory() {
    $.ajax({
      url: `http://localhost:8080/api/v1/transactions`, // The new endpoint we created
      method: 'GET',
      headers: { 'Authorization': 'Bearer ' + token },
      success: (data) => {
        // Logic to populate your table/UI
        $('#transactionTableBody').empty();
        data.forEach(tx => {
          $('#transactionTableBody').append(`
                    <tr>
                        <td>${tx.taskId}</td>
                        <td>Rs. ${tx.totalBudget}</td>
                        <td class="text-danger">Rs. ${tx.systemFee}</td>
                        <td class="text-success">Rs. ${tx.studentEarned}</td>
                        <td>${new Date(tx.timestamp).toLocaleString()}</td>
                    </tr>
                `);
        });
      }
    });
  }
  function deleteTask(id) {
    if(confirm("Delete this task?")) {
      $.ajax({ url: `http://localhost:8080/api/v1/task/${id}`, method: 'DELETE', headers: { 'Authorization': 'Bearer ' + token }, success: () => getAllTasksByUserId() });
    }
  }

  function getStatusBadge(status) {
    if(status === 'ACCEPTED') return 'bg-success';
    if(status === 'REJECTED') return 'bg-danger';
    return 'bg-secondary';
  }
  function changeStatus(appId, status, taskId, empId) {
    if(!confirm(`Are you sure you want to ${status.toLowerCase()} this?`)) return;

    // 1. Application එකේ status එක update කිරීම (Accepted/Rejected)
    $.ajax({
      url: `http://localhost:8080/api/v1/application/${appId}?status=${status}`,
      method: 'PATCH',
      headers: { 'Authorization': 'Bearer ' + token },
      success: () => {
        // 2. පිළිගත්තේ නම් (ACCEPTED), Task එක ONGOING කිරීමට Controller එක call කරයි
        if(status === 'ACCEPTED') {
          $.ajax({
            url: `http://localhost:8080/api/v1/task/accept/${taskId}/${empId}`,
            method: 'POST',
            headers: { 'Authorization': 'Bearer ' + token },
            success: () => {
              alert("Application Accepted! Task is now ONGOING.");
              loadApplications();
              getAllTasksByUserId();
            }
          });
        } else {
          alert("Application Rejected!");
          loadApplications();
          loadApplications();
        }
      },
      error: (xhr) => alert("Failed to update status: " + xhr.status)
    });
  }

  function logout() { localStorage.clear(); window.location.href = "login.html"; }
</script>
</body>
</html>
