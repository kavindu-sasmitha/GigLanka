<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GigLanka | Employee Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; font-family: 'Inter', sans-serif; background: #0f172a; color: white; min-height: 100vh; }
        .sidebar { height: 100vh; background: rgba(30, 41, 59, 0.5); backdrop-filter: blur(10px); border-right: 1px solid rgba(255, 255, 255, 0.1); position: fixed; width: 260px; padding: 30px 20px; z-index: 1000; }
        .main-content { margin-left: 260px; padding: 40px; }
        .glass-card { background: rgba(30, 41, 59, 0.7); padding: 25px; border-radius: 16px; border: 1px solid rgba(255, 255, 255, 0.1); box-shadow: 0 4px 30px rgba(0, 0, 0, 0.3); margin-bottom: 25px; }
        #map { height: 400px; border-radius: 12px; margin-bottom: 20px; border: 1px solid #334155; filter: grayscale(0.5) invert(0.9) hue-rotate(180deg); }
        .task-card { background: #1e293b; border: 1px solid #334155; padding: 15px; border-radius: 12px; margin-bottom: 12px; transition: 0.3s; }
        .task-card:hover { border-color: #10b981; transform: translateY(-2px); }
        .btn-apply { background: #10b981; border: none; border-radius: 8px; padding: 8px 16px; font-weight: 600; color: white; }
        .btn-direction { background: #3b82f6; border: none; border-radius: 8px; padding: 8px 16px; font-weight: 600; color: white; margin-right: 5px; text-decoration: none; display: inline-block; font-size: 14px; }
        .nav-link { color: #94a3b8 !important; padding: 12px 15px; border-radius: 10px; margin-bottom: 10px; text-decoration: none; display: block; cursor: pointer; }
        .nav-link.active { background: rgba(16, 185, 129, 0.1); color: #10b981 !important; }
    </style>
</head>
<body>

<div class="sidebar">
    <h3 class="fw-bold mb-5" style="color: #10b981;">GigLanka</h3>
    <nav class="nav flex-column">
        <a class="nav-link active"><i class="fas fa-search me-2"></i> Browse Tasks</a>
        <a class="nav-link" style="cursor: pointer;" data-bs-toggle="modal" data-bs-target="#completedTasksModal" onclick="loadCompletedTasks()">
            <i class="fas fa-briefcase me-2"></i> My Applications
        </a>
        <div class="mt-5"><a class="nav-link text-danger" onclick="logout()"><i class="fas fa-sign-out-alt me-2"></i> Logout</a></div>
    </nav>
</div>

<div class="main-content">
    <div class="row">
        <div class="col-lg-8">
            <div class="glass-card">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h5><i class="fas fa-map-marked-alt text-success me-2"></i> Explore Tasks</h5>
                    <select id="districtFilter" class="form-select w-50" onchange="filterTasks()" style="background: #1e293b; color: white; border: 1px solid #334155;">
                        <option value="All">All Districts (Sri Lanka)</option>
                        <option value="Ampara">Ampara</option>
                        <option value="Anuradhapura">Anuradhapura</option>
                        <option value="Badulla">Badulla</option>
                        <option value="Batticaloa">Batticaloa</option>
                        <option value="Colombo">Colombo</option>
                        <option value="Galle">Galle</option>
                        <option value="Gampaha">Gampaha</option>
                        <option value="Hambantota">Hambantota</option>
                        <option value="Jaffna">Jaffna</option>
                        <option value="Kalutara">Kalutara</option>
                        <option value="Kandy">Kandy</option>
                        <option value="Kegalle">Kegalle</option>
                        <option value="Kilinochchi">Kilinochchi</option>
                        <option value="Kurunegala">Kurunegala</option>
                        <option value="Mannar">Mannar</option>
                        <option value="Matale">Matale</option>
                        <option value="Matara">Matara</option>
                        <option value="Moneragala">Moneragala</option>
                        <option value="Mullaitivu">Mullaitivu</option>
                        <option value="Nuwara Eliya">Nuwara Eliya</option>
                        <option value="Polonnaruwa">Polonnaruwa</option>
                        <option value="Puttalam">Puttalam</option>
                        <option value="Ratnapura">Ratnapura</option>
                        <option value="Trincomalee">Trincomalee</option>
                        <option value="Vavuniya">Vavuniya</option>
                    </select>
                </div>
                <div id="map"></div>
                <div id="taskList"></div>
            </div>
        </div>

        <div class="col-lg-4">
            <div class="glass-card">
                <h6><i class="fas fa-list-ul text-success me-2"></i> My Applications</h6>
                <table class="table table-hover table-dark mt-3" style="font-size: 13px;">
                    <thead>
                    <tr>
                        <th>Task</th>
                        <th>Status</th>
                        <th>Action</th>
                    </tr>
                    </thead>
                    <tbody id="employeeTaskTableBody">
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<div class="modal fade" id="completedTasksModal" tabindex="-1" aria-labelledby="modalLabel" aria-hidden="true">
    <div class="modal-dialog modal-lg modal-dialog-centered">
        <div class="modal-content" style="background: #1e293b; color: white; border: 1px solid rgba(255, 255, 255, 0.1);">
            <div class="modal-header" style="border-bottom: 1px solid rgba(255, 255, 255, 0.1);">
                <h5 class="modal-title" id="modalLabel"><i class="fas fa-check-circle text-success me-2"></i> My Completed Tasks</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <div class="table-responsive">
                    <table class="table table-dark table-hover">
                        <thead>
                        <tr><th>Task Title</th><th>Status</th></tr>
                        </thead>
                        <tbody id="completedTaskTableBody">
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    let allTasks = [];
    const map = L.map('map').setView([6.9271, 79.8612], 10);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
    let markersLayer = L.layerGroup().addTo(map);

    const token = localStorage.getItem('jwtToken');
    const employeeId = localStorage.getItem('owner_id');
    const employeeName = localStorage.getItem('full_name');

    $(document).ready(function() {
        if (!token) { window.location.href = "login.html"; return; }
        fetchWalletBalance();
        getAllTasksByUserId();
        fetchAllTasks();
    });

    function fetchWalletBalance() {
        $.ajax({
            url: `http://localhost:8080/api/v1/transactions`,
            method: 'GET',
            headers: { 'Authorization': 'Bearer ' + token },
            success: (transactions) => {
                let totalBalance = 0;
                transactions.forEach(tx => {
                    totalBalance += tx.studentEarned;
                });
                $("#walletBalance").text(`LKR ${totalBalance.toFixed(2)}`);
            }
        });
    }

    function fetchAllTasks() {
        $.ajax({
            url: 'http://localhost:8080/api/v1/task/all',
            method: 'GET',
            headers: { 'Authorization': 'Bearer ' + token },
            success: function(res) {
                allTasks = res.data || res;
                filterTasks();
            }
        });
    }

    function filterTasks() {
        const selectedDist = $("#districtFilter").val();
        markersLayer.clearLayers();
        $("#taskList").empty();
        const filtered = allTasks.filter(t => (selectedDist === "All" || t.locationName === selectedDist) && t.status === "PENDING");
        filtered.forEach(task => {
            const marker = L.marker([task.latitude, task.longitude]).addTo(markersLayer);
            marker.bindPopup(`<div style="color:black"><strong>${task.title}</strong><br>LKR ${task.budget}</div>`);
            $("#taskList").append(`
                <div class="task-card">
                    <div class="d-flex justify-content-between align-items-center">
                        <div>
                            <h6 class="mb-1">${task.title}</h6>
                            <p class="small text-muted mb-0"><i class="fas fa-coins me-1"></i> LKR ${task.budget} | <i class="fas fa-map-marker-alt me-1"></i> ${task.locationName}</p>
                        </div>
                        <div>
                            <button class="btn-apply" onclick="applyTask(${task.id})">Flash Accept</button>
                        </div>
                    </div>
                </div>
            `);
        });
    }

    function applyTask(taskId) {
        let applicationData = { id: 0, task_id: taskId, employee_id: parseInt(employeeId), full_name:employeeName, status: "PENDING" };
        $.ajax({
            url: 'http://localhost:8080/api/v1/application',
            method: 'POST',
            contentType: 'application/json',
            headers: { 'Authorization': 'Bearer ' + token },
            data: JSON.stringify(applicationData),
            success: function () {
                alert("Applied successfully!");
                getAllTasksByUserId();
            },
            error: (xhr) => alert("Error: " + xhr.status)
        });
    }

    function getAllTasksByUserId() {
        $.ajax({
            url: `http://localhost:8080/api/v1/application/employee/${employeeId}`,
            method: 'GET',
            headers: { 'Authorization': 'Bearer ' +  token },
            success: function(res) {
                let rows = "";
                const data = res.data || res;
                if (data && data.length > 0) {
                    data.forEach(app => {
                        let directionBtn = "";
                        if (app.status === 'ACCEPTED' || app.status === 'ONGOING') {
                            const lat = app.latitude || 6.9271;
                            const lng = app.longitude || 79.8612;
                            const googleMapsUrl = `https://www.google.com/maps?q=${lat},${lng}`;
                            directionBtn = `<a href="${googleMapsUrl}" target="_blank" class="btn btn-sm btn-info text-white me-1"><i class="fas fa-location-arrow"></i></a>`;
                        }
                        rows += `<tr>
                            <td><small>${app.title || 'Task'}</small></td>
                            <td><span class="badge ${getStatusColor(app.status)}">${app.status}</span></td>
                            <td>
                                <div class="d-flex align-items-center">
                                    ${directionBtn}
                                    <button class="btn btn-sm btn-danger" onclick="deleteApplyTask(${app.id})"><i class="fas fa-times"></i></button>
                                </div>
                            </td>
                        </tr>`;
                    });
                } else {
                    rows = "<tr><td colspan='3' class='text-center text-muted small'>No applications found.</td></tr>";
                }
                $("#employeeTaskTableBody").html(rows);
            }
        });
    }

    function deleteApplyTask(id) {
        if(confirm("Cancel this application?")) {
            $.ajax({
                url: `http://localhost:8080/api/v1/application/${id}`,
                method: 'DELETE',
                headers: { 'Authorization': 'Bearer ' + token },
                success: () => { alert("Cancelled!"); getAllTasksByUserId(); }
            });
        }
    }

    function loadCompletedTasks() {
        $.ajax({
            url: `http://localhost:8080/api/v1/task/completed/${employeeId}`,
            method: 'GET',
            headers: { 'Authorization': 'Bearer ' + token },
            success: (tasks) => {
                let rows = "";
                if (tasks && tasks.length > 0) {
                    tasks.forEach(task => {
                        rows += `<tr>
                                <td>${task.title}</td>
                                <td><span class="badge bg-success">${task.status}</span></td>
                             </tr>`;
                    });
                } else {
                    rows = "<tr><td colspan='2' class='text-center'>No completed tasks yet.</td></tr>";
                }
                $("#completedTaskTableBody").html(rows);
            }
        });
    }

    function getStatusColor(status) {
        if (status === 'PENDING') return 'bg-warning text-dark';
        if (status === 'ACCEPTED' || status === 'ONGOING') return 'bg-success';
        if (status === 'REJECTED') return 'bg-danger';
        return 'bg-secondary';
    }

    function logout() { localStorage.clear(); window.location.href = "login.html"; }
</script>
</body>
</html>
