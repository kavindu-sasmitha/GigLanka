<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GigLanka | Employee Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root {
            --primary: #10b981;
        }

        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            background: #f8fafc;
            color: #1e2937;
            min-height: 100vh;
        }

        .sidebar {
            height: 100vh;
            background: white;
            border-right: 1px solid #e2e8f0;
            position: fixed;
            width: 280px;
            padding: 32px 24px;
            box-shadow: 2px 0 15px rgba(0, 0, 0, 0.05);
            z-index: 1000;
        }

        .logo-container {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 50px;
        }

        .sri-lanka-flag {
            width: 38px;
            height: 25px;
            background: linear-gradient(to right, #ff0000 40%, #ffcc00 40%);
            border: 1px solid #e2e8f0;
            position: relative;
            border-radius: 3px;
            overflow: hidden;
        }

        .sri-lanka-flag::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) rotate(15deg);
            width: 12px;
            height: 12px;
            background: #006600;
            border-radius: 50%;
        }

        .logo {
            font-size: 28px;
            font-weight: 700;
            color: #0f172a;
            letter-spacing: -1px;
        }

        .nav-link {
            color: #475569;
            padding: 14px 20px;
            border-radius: 12px;
            margin-bottom: 8px;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 12px;
            font-weight: 500;
        }

        .nav-link:hover, .nav-link.active {
            background: #ecfdf5;
            color: var(--primary);
            font-weight: 600;
        }

        .nav-link.active {
            box-shadow: 0 0 0 2px rgba(16, 185, 129, 0.2);
        }

        .main-content {
            margin-left: 280px;
            padding: 40px 50px;
        }

        .glass-card {
            background: white;
            border: 1px solid #e2e8f0;
            border-radius: 20px;
            padding: 32px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.06);
            margin-bottom: 30px;
        }

        #map {
            height: 420px;
            border-radius: 16px;
            border: 1px solid #e2e8f0;
        }

        .task-card {
            background: white;
            border: 1px solid #e2e8f0;
            padding: 20px;
            border-radius: 16px;
            margin-bottom: 16px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.04);
        }

        .task-card:hover {
            border-color: var(--primary);
            transform: translateY(-4px);
        }

        .btn-apply {
            background: linear-gradient(135deg, #10b981, #34d399);
            border: none;
            border-radius: 12px;
            padding: 12px 26px;
            font-weight: 600;
            color: white;
            box-shadow: 0 4px 15px rgba(16, 185, 129, 0.25);
        }

        .btn-direction {
            background: #2563eb;
            border: none;
            border-radius: 12px;
            padding: 10px 20px;
            color: white;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 14px;
        }

        .badge {
            padding: 6px 14px;
            border-radius: 50px;
            font-size: 13px;
        }
    </style>
</head>
<body>

<div class="sidebar">
    <div class="logo-container">
        <div class="sri-lanka-flag"></div>
        <span class="logo">GigLanka</span>
    </div>

    <nav class="nav flex-column">
        <a class="nav-link active"><i class="fas fa-compass me-2"></i> Browse Tasks</a>
        <a class="nav-link" style="cursor: pointer;" data-bs-toggle="modal" data-bs-target="#completedTasksModal" onclick="loadCompletedTasks()">
            <i class="fas fa-briefcase me-2"></i> My Applications
        </a>
        <div class="mt-auto pt-5">
            <a class="nav-link text-danger" onclick="logout()"><i class="fas fa-sign-out-alt me-2"></i> Logout</a>
        </div>
    </nav>
</div>

<div class="main-content">
    <div class="row mb-4">
        <div class="col-md-5">
            <div class="glass-card text-center" style="border-left: 6px solid #10b981;">
                <p class="text-muted small mb-1">My Earnings (98% Share)</p>
                <h3 id="walletBalance" class="fw-bold text-success mb-0">LKR 0.00</h3>
            </div>
        </div>
    </div>

    <div class="row">
        <div class="col-lg-8">
            <div class="glass-card">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h5><i class="fas fa-map-marked-alt text-success me-3"></i> Explore Available Gigs</h5>
                    <select id="districtFilter" class="form-select w-50" onchange="filterTasks()">
                        <option value="All">All Districts - Sri Lanka</option>
                        <option value="Ampara">Ampara</option>
                        <option value="Anuradhapura">Anuradhapura</option>
                        <option value="Badulla">Badulla</option>
                        <option value="Batticaloa">Batticaloa</option>
                        <option value="Colombo">Colombo</option>
                        <option value="Galle">Galle</option>
                        <option value="Gampaha">Gampaha</option>
                        <option value="Hambantota">Hambantota</option>
                        <option value="Jaffna">Jaffna</option>
                        <option value="Kalutara">Kalutara</option>
                        <option value="Kandy">Kandy</option>
                        <option value="Kegalle">Kegalle</option>
                        <option value="Kilinochchi">Kilinochchi</option>
                        <option value="Kurunegala">Kurunegala</option>
                        <option value="Mannar">Mannar</option>
                        <option value="Matale">Matale</option>
                        <option value="Matara">Matara</option>
                        <option value="Moneragala">Moneragala</option>
                        <option value="Mullaitivu">Mullaitivu</option>
                        <option value="Nuwara Eliya">Nuwara Eliya</option>
                        <option value="Polonnaruwa">Polonnaruwa</option>
                        <option value="Puttalam">Puttalam</option>
                        <option value="Ratnapura">Ratnapura</option>
                        <option value="Trincomalee">Trincomalee</option>
                        <option value="Vavuniya">Vavuniya</option>
                    </select>
                </div>

                <div id="map"></div>

                <div class="mt-4">
                    <h6 class="mb-3">Available Tasks Near You</h6>
                    <div id="taskList"></div>
                </div>
            </div>
        </div>

        <div class="col-lg-4">
            <div class="glass-card">
                <h6 class="mb-3"><i class="fas fa-list-ul text-success me-2"></i> My Applications</h6>
                <div class="table-responsive">
                    <table class="table table-hover align-middle">
                        <thead>
                        <tr>
                            <th>Task</th>
                            <th>Status</th>
                            <th class="text-end">Action</th>
                        </tr>
                        </thead>
                        <tbody id="employeeTaskTableBody"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Completed Tasks Modal -->
<div class="modal fade" id="completedTasksModal" tabindex="-1" aria-labelledby="modalLabel" aria-hidden="true">
    <div class="modal-dialog modal-lg modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="modalLabel">
                    <i class="fas fa-check-circle text-success me-2"></i> My Completed Tasks
                </h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <div class="table-responsive">
                    <table class="table table-hover">
                        <thead>
                        <tr><th>Task Title</th><th>Status</th></tr>
                        </thead>
                        <tbody id="completedTaskTableBody"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    let allTasks = [];
    const map = L.map('map').setView([6.9271, 79.8612], 10);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
    let markersLayer = L.layerGroup().addTo(map);

    const token = localStorage.getItem('jwtToken');
    const employeeId = localStorage.getItem('owner_id');
    const employeeName = localStorage.getItem('full_name');

    $(document).ready(function() {
        if (!token) {
            window.location.href = "../login.html";
            return;
        }

        fetchWalletBalance();
        fetchAllTasks();
        getAllTasksByUserId();
    });

    function fetchWalletBalance() {
        $.ajax({
            url: `http://localhost:8080/api/v1/transactions/${employeeId}`,
            method: 'GET',
            headers: { 'Authorization': 'Bearer ' + token },
            success: (transactions) => {
                let total = 0;
                (transactions || []).forEach(tx => total += (tx.studentEarned || 0));
                $("#walletBalance").text(`LKR ${total.toFixed(2)}`);
            }
        });
    }

    function fetchAllTasks() {
        $.ajax({
            url: 'http://localhost:8080/api/v1/task/all',
            method: 'GET',
            headers: { 'Authorization': 'Bearer ' + token },
            success: function(res) {
                allTasks = res.data || res || [];
                filterTasks();
            }
        });
    }

    function filterTasks() {
        const selectedDist = $("#districtFilter").val() || "All";
        markersLayer.clearLayers();
        $("#taskList").empty();

        const filtered = allTasks.filter(t => {
            const loc = (t.locationName || t.district || "").trim();
            return (selectedDist === "All" || loc === selectedDist) && t.status === "PENDING";
        });

        filtered.forEach(task => {
            const lat = parseFloat(task.latitude) || 6.9271;
            const lng = parseFloat(task.longitude) || 79.8612;
            const locName = task.locationName || task.district || "Unknown";

            L.marker([lat, lng]).addTo(markersLayer)
                .bindPopup(`<b>${task.title}</b><br>LKR ${task.budget}`);

            $("#taskList").append(`
                <div class="task-card">
                    <div class="d-flex justify-content-between align-items-center">
                        <div>
                            <h6 class="mb-1">${task.title}</h6>
                            <p class="small text-muted mb-0">
                                <i class="fas fa-coins me-1"></i> LKR ${task.budget || 0} |
                                <i class="fas fa-map-marker-alt me-1"></i> ${locName}
                            </p>
                        </div>
                        <button class="btn-apply" onclick="applyTask(${task.id})">Flash Accept</button>
                    </div>
                </div>
            `);
        });
    }

    function applyTask(taskId) {
        const applicationData = {
            id: 0,
            task_id: taskId,
            employee_id: parseInt(employeeId),
            full_name: employeeName,
            title:taskId.title,
            status: "PENDING"
        };

        $.ajax({
            url: 'http://localhost:8080/api/v1/application',
            method: 'POST',
            contentType: 'application/json',
            headers: { 'Authorization': 'Bearer ' + token },
            data: JSON.stringify(applicationData),
            success: () => {
                alert("✅ Applied successfully!");
                getAllTasksByUserId();
            },
            error: (xhr) => alert("Error: " + xhr.status)
        });
    }

    function getAllTasksByUserId() {
        $.ajax({
            url: `http://localhost:8080/api/v1/application/employee/${employeeId}`,
            method: 'GET',
            headers: { 'Authorization': 'Bearer ' + token },
            success: function(res) {
                let rows = "";
                const data = res.data || res || [];

                if (data.length > 0) {
                    data.forEach(app => {
                        let directionBtn = "";

                        // FIXED: Properly check for direction button
                        if (app.status === 'ACCEPTED' || app.status === 'ONGOING') {
                            const lat = parseFloat(app.latitude) || 6.9271;
                            const lng = parseFloat(app.longitude) || 79.8612;
                            const googleMapsUrl = `https://www.google.com/maps?q=${lat},${lng}`;

                            directionBtn = `
                                <a href="${googleMapsUrl}" target="_blank" class="btn-direction" title="Get Directions">
                                    <i class="fas fa-location-arrow"></i> Directions
                                </a>`;
                        }

                        rows += `<tr>
                            <td><small>${app.title || 'Task'}</small></td>
                            <td><span class="badge ${getStatusColor(app.status)}">${app.status}</span></td>
                            <td class="text-end">
                                <div class="d-flex gap-2 justify-content-end">
                                    ${directionBtn}
                                    <button class="btn btn-sm btn-outline-danger" onclick="deleteApplyTask(${app.id})">
                                        <i class="fas fa-times"></i>
                                    </button>
                                </div>
                            </td>
                        </tr>`;
                    });
                } else {
                    rows = `<tr><td colspan="3" class="text-center text-muted py-4">No applications found yet.</td></tr>`;
                }
                $("#employeeTaskTableBody").html(rows);
            }
        });
    }

    function deleteApplyTask(id) {
        if (confirm("Cancel this application?")) {
            $.ajax({
                url: `http://localhost:8080/api/v1/application/${id}`,
                method: 'DELETE',
                headers: { 'Authorization': 'Bearer ' + token },
                success: () => {
                    alert("Cancelled successfully!");
                    getAllTasksByUserId();
                }
            });
        }
    }

    function loadCompletedTasks() {
        $.ajax({
            url: `http://localhost:8080/api/v1/task/completed/${employeeId}`,
            method: 'GET',
            headers: { 'Authorization': 'Bearer ' + token },
            success: (tasks) => {
                let rows = "";
                const taskList = tasks || [];
                if (taskList.length > 0) {
                    taskList.forEach(task => {
                        rows += `<tr>
                            <td>${task.title}</td>
                            <td><span class="badge bg-success">${task.status}</span></td>
                         </tr>`;
                    });
                } else {
                    rows = `<tr><td colspan="2" class="text-center text-muted py-4">No completed tasks yet.</td></tr>`;
                }
                $("#completedTaskTableBody").html(rows);
            }
        });
    }

    function getStatusColor(status) {
        if (status === 'PENDING') return 'bg-warning text-dark';
        if (status === 'ACCEPTED' || status === 'ONGOING') return 'bg-success text-white';
        if (status === 'REJECTED') return 'bg-danger text-white';
        return 'bg-secondary text-white';
    }

    function logout() {
        localStorage.clear();
        window.location.href = "login.html";
    }
</script>
</body>
</html>
